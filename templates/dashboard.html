<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom {
            background: linear-gradient(135deg, #1a3c6e, #2980b9);
            padding: 15px 20px;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .navbar-custom h1 { color: white; font-size: 1.5rem; font-weight: bold; margin: 0; }
        .navbar-custom .user-info { color: rgba(255,255,255,0.85); font-size: 0.9rem; }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .card-header {
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
            padding: 15px 20px;
            background: linear-gradient(135deg, #1a3c6e, #2980b9);
            color: white;
        }
        .metric-card {
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            padding: 5px 15px;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.35); color: white; }
    </style>
</head>
<body>

    <div class="navbar-custom d-flex justify-content-between align-items-center">
        <div>
            <img src="{{ url_for('static', filename='logo.png') }}" style="height:55px; margin-right:15px;">
            <span class="navbar-custom h1">📊 Dashboard</span>
            <div class="user-info">👤 Connecté : {{ user }}</div>
        </div>
        <div class="d-flex gap-2">
            <a href="/" class="logout-btn">🏠 Accueil</a>
            <a href="/logout" class="logout-btn">🚪 Déconnexion</a>
        </div>
    </div>

    <div class="container">

        <!-- Métriques -->
        <div class="row">
            <div class="col-md-4">
                <div class="metric-card" style="background: linear-gradient(135deg, #27ae60, #2ecc71);">
                    <div style="font-size: 1rem;">💰 Total encaissé</div>
                    <div style="font-size: 1.8rem; font-weight: bold;">{{ total_encaisse | int }} FCFA</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card" style="background: linear-gradient(135deg, #c0392b, #e74c3c);">
                    <div style="font-size: 1rem;">❌ Total impayés</div>
                    <div style="font-size: 1.8rem; font-weight: bold;">{{ total_impayes | int }} FCFA</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card" style="background: linear-gradient(135deg, #1a3c6e, #2980b9);">
                    <div style="font-size: 1rem;">📈 Taux de recouvrement</div>
                    <div style="font-size: 1.8rem; font-weight: bold;">{{ taux }}%</div>
                </div>
            </div>
        </div>

        <!-- Graphique -->
        <div class="card">
            <div class="card-header">📊 Revenus par mois</div>
            <div class="card-body">
                <div style="position: relative; height: 350px;">
                    <canvas id="revenueChart" role="img" aria-label="Graphique des revenus par mois">Revenus mensuels encaissés et impayés.</canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        const labels = {{ mois_labels | tojson }};
        const encaisses = {{ mois_encaisses | tojson }};
        const impayes = {{ mois_impayes | tojson }};

        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Encaissé',
                        data: encaisses,
                        backgroundColor: '#1a3c6e',
                        borderRadius: 6,
                    },
                    {
                        label: 'Impayés',
                        data: impayes,
                        backgroundColor: '#e74c3c',
                        borderRadius: 6,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => ctx.dataset.label + ' : ' + ctx.parsed.y.toLocaleString() + ' FCFA'
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: {
                        ticks: {
                            callback: (v) => (v / 1000) + 'k FCFA'
                        }
                    }
                }
            }
        });
    </script>

</body>
</html>
