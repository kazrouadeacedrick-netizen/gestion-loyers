<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom {
            background: linear-gradient(135deg, #1a3c6e, #2980b9);
            padding: 15px 20px;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .card-header {
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
            padding: 15px 20px;
            background: linear-gradient(135deg, #1a3c6e, #2980b9);
            color: white;
        }
        .metric-card {
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .metric-card p { margin: 0; }
        .metric-card .value { font-size: 1.5rem; font-weight: bold; }
        .metric-card .label { font-size: 0.85rem; opacity: 0.85; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            padding: 5px 15px;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.35); color: white; }
    </style>
</head>
<body>

    <div class="navbar-custom d-flex justify-content-between align-items-center">
        <div>
            <img src="{{ url_for('static', filename='logo.png') }}" style="height:55px; margin-right:15px;">
            <span style="color:white; font-size:1.3rem; font-weight:bold;">Tableau de bord</span>
        </div>
        <div class="d-flex gap-2">
            <a href="/" class="logout-btn">🏠 Accueil</a>
            <a href="/logout" class="logout-btn">🚪 Déconnexion</a>
        </div>
    </div>

    <div class="container">

        <div class="row">
            <div class="col-md-4">
                <div class="metric-card" style="background: linear-gradient(135deg, #27ae60, #2ecc71);">
                    <p class="label">Total encaissé</p>
                    <p class="value">{{ total_encaisse | int }} FCFA</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card" style="background: linear-gradient(135deg, #c0392b, #e74c3c);">
                    <p class="label">Total impayés</p>
                    <p class="value">{{ total_impayes | int }} FCFA</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card" style="background: linear-gradient(135deg, #1a3c6e, #2980b9);">
                    <p class="label">Taux de recouvrement</p>
                    <p class="value">{{ taux }}%</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📊 Revenus par mois</div>
            <div class="card-body">
                <canvas id="revenueChart" style="height:350px;"></canvas>
            </div>
        </div>

    </div>

    <script>
        const mois = {{ mois_labels | tojson }};
        const encaisses = {{ encaisses | tojson }};
        const impayes = {{ impayes | tojson }};

        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: mois,
                datasets: [
                    {
                        label: 'Encaissé',
                        data: encaisses,
                        backgroundColor: '#1a3c6e',
                        borderRadius: 6
                    },
                    {
                        label: 'Impayés',
                        data: impayes,
                        backgroundColor: '#e74c3c',
                        borderRadius: 6
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (ctx) => ctx.dataset.label + ' : ' + ctx.parsed.y.toLocaleString() + ' FCFA'
                        }
                    }
                },
                scales: {
                    y: {
                        ticks: { callback: (v) => (v/1000) + 'k' }
                    }
                }
            }
        });
    </script>

</body>
</html>
