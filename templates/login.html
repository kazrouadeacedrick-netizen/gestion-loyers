<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c6e, #2ecc71);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background: linear-gradient(135deg, #1a3c6e, #2980b9);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header h2 {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .login-body {
            padding: 30px;
            background: white;
        }
        .btn-login {
            background: linear-gradient(135deg, #1a3c6e, #2980b9);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            transition: opacity 0.3s;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="{{ url_for('static', filename='logo.png') }}" style="height:80px; margin-bottom:10px;">
            <h2>Gestion des Loyers</h2>
            <p class="mb-0 opacity-75">Connectez-vous pour continuer</p>
        </div>
        <div class="login-body">
            {% if erreur %}
            <div class="alert alert-danger rounded-3">{{ erreur }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">👤 Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" placeholder="Entrez votre nom" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">🔒 Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="Entrez votre mot de passe" required>
                </div>
                <button type="submit" class="btn btn-login">Se connecter</button>
            </form>
        </div>
    </div>
</body>
</html>
